name: generate animation

on:
  schedule:
    # Runs every 5 minutes (the fastest allowed by GitHub)
    - cron: "*/5 * * * *"
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates the 3D Isometric City (shape=box)
      - name: generate-3d-city-svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: phero20
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&shape=box
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&shape=box&color_snake=#7c3aed&color_dots=#0d0d0d,#1a0533,#2d0b61,#7c3aed,#A855F7
          
      # Push the SVG to the 'output' branch
      - name: push-to-output-branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
